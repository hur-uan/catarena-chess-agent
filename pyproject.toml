[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py39"
exclude = [".venv", "external", "reports", "memory"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["UP006", "UP007", "UP031", "UP035", "UP045"]

[tool.ruff.lint.per-file-ignores]
"scripts/*.py" = ["E402"]
